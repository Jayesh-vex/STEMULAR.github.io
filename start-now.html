<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEMULAR Portal</title>
  <link rel="stylesheet" href="login-style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Ambient Background Glows -->
  <div class="ambient-light light-1"></div>
  <div class="ambient-light light-2"></div>

  <header class="portal-header">
    <a href="index.html" class="portal-logo" aria-label="Return to STEMULAR home">
      <span class="portal-logo-icon">⏣</span> STEMULAR
    </a>
  </header>

  <main class="split-screen">
    
    <!-- LEFT SIDE: EVE-INSPIRED ROBOT SECTION -->
    <section class="robot-section">
      <div class="robot-stage">
        <div class="robot-container" id="robot">
          
          <!-- Floating Flippers (High Z-Index to physically shield face) -->
          <div class="flipper flipper-left" id="flipper-left"></div>
          <div class="flipper flipper-right" id="flipper-right"></div>

          <!-- EVE Floating Head -->
          <div class="eve-head" id="robot-head">
            <div class="eve-visor">
              <!-- Glowing Digital LED Eyes -->
              <div class="led-eye left-eye" id="eye-left"></div>
              <div class="led-eye right-eye" id="eye-right"></div>
            </div>
          </div>

          <!-- Magnetic Levitation Gap -->
          <div class="mag-lev-gap"></div>

          <!-- EVE Egg Body -->
          <div class="eve-body">
            <div class="status-emblem">🪴</div>
          </div>
          
          <div class="eve-shadow"></div>
        </div>
      </div>
      <div class="robot-caption">
        <h2>STEMULAR Guardian</h2>
        <p>Extraterrestrial Vegetation Evaluator - Securing your credentials.</p>
      </div>
    </section>

    <!-- RIGHT SIDE: AUTHENTICATION FORM -->
    <section class="form-section">
      <div class="auth-card">
        
        <!-- Tab Switcher -->
        <div class="tab-switcher">
          <button class="tab-btn active" id="tab-login" type="button">Sign In</button>
          <button class="tab-btn" id="tab-register" type="button">Create Account</button>
          <div class="tab-indicator" id="tab-indicator"></div>
        </div>

        <!-- Title & Status Messages -->
        <div class="form-header">
          <h1 id="form-title">Welcome Back</h1>
          <p id="form-subtitle">Enter your details to access your secure portal.</p>
          <div class="alert-box" id="alert-box"></div>
        </div>

        <!-- Authentication Form -->
        <form id="auth-form" novalidate>
          
          <!-- Username Field -->
          <div class="input-group">
            <label for="username">Username</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
            </div>
          </div>

          <!-- Email Field (Register Only) -->
          <div class="input-group collapsible" id="group-email">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <span class="input-icon">✉️</span>
              <input type="email" id="email" placeholder="eve@axiom.space" autocomplete="email">
            </div>
          </div>

          <!-- Password Field -->
          <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
              <button type="button" class="toggle-password" id="toggle-password" aria-label="Toggle password visibility">
                <svg class="eye-svg open-eye" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg class="eye-svg closed-eye hidden" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <!-- Confirm Password Field (Register Only) -->
          <div class="input-group collapsible" id="group-confirm-password">
            <label for="confirm-password">Confirm Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🛡️</span>
              <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password">
              <button type="button" class="toggle-password" id="toggle-confirm-password" aria-label="Toggle password visibility">
                <svg class="eye-svg open-eye" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg class="eye-svg closed-eye hidden" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <!-- Form Options -->
          <div class="form-options">
            <label class="checkbox-wrapper">
              <input type="checkbox" id="remember-me">
              <span class="checkmark"></span>
              <span class="label-text">Remember me</span>
            </label>
            <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="submit-btn" id="submit-btn">
            <span id="btn-text">Sign In</span>
            <span class="btn-arrow">→</span>
          </button>
        </form>
        <script>
          async function resetStorage() {
            if (!confirm("Reset local storage? This cannot be undone.")) return;

            try {
              const response = await fetch("http://localhost:3000/api/audit/reset", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: "{}"
              });

              if (!response.ok) throw new Error("Audit entry was not saved.");

            localStorage.clear();
              alert("Local Storage has been cleared and the accounts were terminated in save.txt.");
            location.reload();
            } catch (error) {
              alert("The reset was not completed because it could not be recorded. Run npm start and try again.");
            }
          }
        </script>

      </div>
    </section>

  </main>

  <button class="reset-btn" onclick="resetStorage()">Reset Local Storage</button>
  <script src="login-script.js"></script>
</body>
</html>
