<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AID.EM - Future Technology Education</title>
  <link rel="stylesheet" href="Enter_page.css">
</head>
<body>

  <!-- Animated Background Layer with Left & Right Blur Balls -->
  <div class="bg-animated" id="bgAnim">
    <div class="blur-ball ball-left"></div>
    <div class="blur-ball ball-right"></div>
  </div>

  <main class="stage-container">
    <div class="images-stage" id="stage">
      
      <!-- 5.png -->
      <div class="img-wrapper" id="wrapper-5">
        <img src="5.png" alt="Primary Image" class="anim-img">
      </div>

      <!-- 4.png -->
      <div class="img-wrapper" id="wrapper-4">
        <img src="4.png" alt="Secondary Image" class="anim-img">
      </div>

    </div>

    <!-- Editable Action Button -->
    <div class="button-container">
      <a href="Overview.html" class="action-btn" id="actionBtn" target="_blank">
        Visit STEMULAR
      </a>
    </div>
  </main>

  <script src="Enter_page.js"></script>
</body>
</html>
